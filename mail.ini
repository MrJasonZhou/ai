; ──────────────────────────────────────────────────────────────────────────────
; [DEFAULT] の値は全セクションで共有される
; ──────────────────────────────────────────────────────────────────────────────
[DEFAULT]
; ESP（メール配信サービス）ホワイトリスト（カンマ区切り）
; Return-Path と From ドメインが異なっても正当とみなす送信元ドメイン
esp_whitelist = mpse.jp,
                bounces.amazon.co.jp,
                amazonses.com,
                sendgrid.net,
                mailgun.org,
                sparkpostmail.com,
                mcsv.net,
                list-manage.com,
                emltrk.com,
                kakaku.com

; ──────────────────────────────────────────────────────────────────────────────
[YahooJapanMail]
; 使用プロトコル: imap または pop3
mode        = imap
; 迷惑メールフォルダ名（IMAP モードのみ有効。空にすると自動検出）
junk_folder = Bulk Mail
; 受信メール（IMAP）
imap_server = imap.mail.yahoo.co.jp
imap_ssl    = SSL
imap_port   = 993
; 受信メール（POP3）
pop_server  = pop.mail.yahoo.co.jp
pop_ssl     = SSL
pop_port    = 995
; 送信メール（SMTP）
smtp_server = smtp.mail.yahoo.co.jp
smtp_auth   = SMTP_AUTH
smtp_ssl    = SSL
smtp_port   = 465
; アカウント情報（アカウント名/ログイン名 = Yahoo! JAPAN ID）
username    =
email       =
password    =
